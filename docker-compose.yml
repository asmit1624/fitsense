version: "3.8"

services:
  postgres:
    image: postgres:16
    container_name: fitsense-postgres
    environment:
      POSTGRES_USER: fitsense
      POSTGRES_PASSWORD: fitsense
      POSTGRES_DB: fitsense
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  n8n:
    image: n8nio/n8n:latest
    container_name: fitsense-n8n
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=fitsense
      - DB_POSTGRESDB_PASSWORD=fitsense
      - WEBHOOK_URL=https://YOUR-CLOUDFLARE-TUNNEL-URL-HERE
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - EXECUTIONS_DATA_SAVE_ON_ERROR=all
      - EXECUTIONS_DATA_SAVE_ON_SUCCESS=all
      - OLLAMA_KEEP_ALIVE=30m
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - postgres
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  postgres_data:
  n8n_data:
